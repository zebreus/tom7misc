pngfile fixedersyslight2x.png
name FixederSys Light 2x
copyright By Tom 7, based on the classic VGA font
fixed-width
# character is actually 16 pixels wide; we use two
# pixels for spacing so that is 2x the 1x image.
spacing 2
charbox-width 18
charbox-height 32
chars-across 16
chars-down 24
extra-linespacing 0
descent 6
# vendor "Frog" is reserved for Tom 7's
# "Divide by Zero" fonts!
vendor Frog

pages bit7-classic bit7-latinabc bit7-extended bit7-extended2 bit7-cyrillic bit7-math

# 4x4 dot
braille-on [
  .@@.
  @@@@
  @@@@
  .@@.
]

# empty
braille-off [
  ....
  ....
  ....
  ....
]

braille-x 2 10
braille-y 2 10 18 26

