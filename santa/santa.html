<script>
 const SG = 97035875817856538071097984852143659850113040717180487875783371565273451246536742216736174708384786740533253396405747907150289525915530187570793986154826348563714376657128702681501301402031940740650862603724498556707966425139408498592844034405758710413665458781750608095937065069407231405292878119711821831393n;

 const P = SG * 2n + 1n;

 const G = 7n;

 function Init() {
   // document.body.innerHTML = P.toString();
 }

 function PowMod(base_in, exp, mod) {
   let res = 1n;
   let base = base_in % mod;
   while (exp != 0n) {
     if ((exp & 1n) != 0n) {
       res = (res * base) % mod;
     }
     exp = exp >> 1n;
     base *= base;
     base = base % mod;
   }
   return res;
 }

 // Returns {g, s, t} where g is GCD(a, b) and as + bt = g.
 // ("Bézout coefficients" where |s| <= |b/d| and |y| <= |a/d|).
 function ExtendedGCD(a, b) {
   let s = 0n;
   let old_s = 1n;
   let t = 1n;
   let old_t = 0n;
   let r = b;
   let old_r = a;

   while (r != 0n) {
     let quotient = old_r / r;
     let rem = old_r % r;

     old_r = r;
     r = rem;

     // Update Bezout coefficients s and t.
     let next_s = old_s - quotient * s;
     old_s = s;
     s = next_s;

     let next_t = old_t - quotient * t;
     old_t = t;
     t = next_t;
   }

   // Now we have
   // g = old_r
   // s = old_s
   // t = old_t

   // The GCD is conventionally non-negative. If old_r is negative
   // (which can happen if inputs are negative), we negate all three
   // results to maintain the identity a*s + b*t = g.
   if (old_r < 0n) {
     old_r = -old_r;
     old_s = -old_s;
     old_t = -old_t;
   }

   return {g: old_r, s: old_s, t: old_t};
 }

 // returns a⁻¹ mod b
 // or null if the inverse does not exist.
 function ModInverse(a, b) {
   // The modulus b must be positive.
   if (b < 0n) return null;

   //   a*s + b*t = g
   // GCD g must be 1. So then we have
   //   a*s + 0*t = 1 (mod b)  =>  a*s = 1 (mod b)
   // So s is the inverse we're looking for.
   const {g, s, t} = ExtendedGCD(a, b);

   // Must be relatively prime, or no inverse exists.
   if (g != 1n) return null;

   // Ensure s is in the canonical range [0, b - 1].
   // Since |s| <= |b/d|, s+b is non-negative.
   return (s + b) % b;
 }

 (() => {
   const base = 123456789n;
   const exp = 12335113756362671231619n;
   const r = PowMod(base, exp, SG);
   if (r != 89549230592244971229975513552128257877259550188799981026600345227666882990892585579185479464810825325533363915364165468561120948729143533998935753896801605248057541065413787845174472322212914373335058450251299377379916429852937109723112741859666398606654834348212486074366996798666835528985406815012420262632n) {
     console.log(r);
     throw 'powmod self-check failed';
   }

   let {g, s, t} = ExtendedGCD(123456789011223550n, 39881178543293726n);
   if (g != 32175552098n ||
       s != 461589n ||
       t != -1428902n) {
     throw 'extended gcd self-check failed';
   }

   let mo = ModInverse(12345678912345n, SG);
   if (mo == null || mo != 56945918582425221484443305220949382061444053705536457120944531037153213910657116640517008327376880851764334588275981915521856995455756014633848657707596860400777672275891808169044793952114909304235489861381315268395431784880870758297576662648259015874584125426380621082028277025788891125232353543599319223837n) {
     throw 'mod inverse self-check failed';
   }

   if (PowMod(G, 2n, P) == 1n ||
       PowMod(G, SG, P) == 1n) {
     throw 'g is not a generator';
   }

   console.log('self-check ok');
 })();

 function error(s) {
   let elt = document.getElementById('error');
   if (!elt) {
     alert(s);
   } else {
     elt.innerHTML = s;
     elt.classList.remove('flash-error');
     // Force reflow.
     void elt.offsetWidth;
     elt.classList.add('flash-error');
   }
 }

 let secret_key = 1n;
 let public_key = 1n;

 function ReadTextArea(id) {
   let e = document.getElementById(id);
   return (e && e.value) || '';
 }

 function TextAreaNumber(id) {
   let s = ReadTextArea(id).replace(/[^0-9]/g, '');
   return (s === '') ? 0n : BigInt(s);
 }

 function SetNum(id, n) {
   let elt = document.getElementById(id);
   if (elt) {
     elt.innerHTML = n.toString();
   }
 }

 function GeneratePublic() {
   secret_key = TextAreaNumber('secret_key');

   if (secret_key <= 1n || secret_key >= P) {
     error('secret key must be in the range 1..P-1. got: ' +
           secret_key.toString());
     public_key = 1n;
   } else {
     public_key = PowMod(G, secret_key, P);
   }

   SetNum('public_key', public_key);
 }

 // Generate a random number in 1...P-1.
 function RandomP() {
   for (;;) {
     const num_bytes = Math.ceil(P.toString(16).length / 2) | 0;
     const bytes = new Uint8Array(num_bytes);
     window.crypto.getRandomValues(bytes);
     let n = 0n;
     for (let i = 0; i < num_bytes; i++) {
       n = n * 256n + BigInt(bytes[i]);
     }
     // XXX should do rejection sampling here or something smart;
     // modulus adds bias.
     n = n % P;
     if (n > 0n && n < P - 1n) {
       return n;
     }
   }
 }

 // Base 100
 function ASCIIToNum(s) {
   let n = 0n;
   for (let i = 0; i < s.length; i++) {
     let d = s.charCodeAt(i) - 28;
     // Encode newlines as DEL.
     if (d == ('\n'.charCodeAt(0) - 28)) d = 127 - 28;
     if (d <= 3 || d >= 100) {
       error("must use only basic ascii. saw U+" +
             s.charCodeAt(i).toString(16) + " => " +
       d);
     } else {
       n = 100n * n + BigInt(d);
     }
   }
   return n;
 }

 // This strips leading zeroes; those are invalid
 // in this encoding anyway.
 function NumToASCII(n) {
   let a = [];
   while (n > 0n) {
     let d = Number(n % 100n);
     n = n / 100n;
     d += 28;
     if (d == 127) d = '\n'.charCodeAt(0);
     a.push_back(String.fromCharCode(d));
   }
   return a.reverse().join('');
 }

 function EncryptForm() {
   let key = TextAreaNumber('enc_key');
   let msg = ReadTextArea('enc_msg');

   // HERE: Padding

   let plain = ASCIIToNum(msg);
   if (plain == 0n || plain >= P - 1n) {
     error('message empty or too long!');
   } else {
     SetNum('enc_plain', plain);
     let y = RandomP();
     let s = PowMod(key, y, P);
     let c1 = PowMod(G, y, P);
     let c2 = (plain * s) % P;

     SetNum('enc_c1', c1);
     SetNum('enc_c2', c2);
   }
 }

</script>
