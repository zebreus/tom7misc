<script>
 const SG = 22335113756362611231619557239211418767540489183409330290855802889083999107738484641106849613637628390352921208300323622519788757587605826611744426549833087972186751180934747355542952556469400709276066714782351279851504089936663676206255149709639743964301450072693148197457151205961671500775877483352290899047249330367207224058474491856089786759090104187768972719321429006117433077358431885437136586687529575468669014833350590999128537035494158851401435186029621297472110326935120229953843263452695861796711905300405424819149527937072767156433251714272239695385442632264521421836962029898840521629387809043196823277609n;

 const P = SG * 2n + 1n;

 function Init() {
   document.body.innerHTML = P.toString();
 }

 function PowMod(base_in, exp, mod) {
   let res = 1n;
   let base = base_in % mod;
   while (exp != 0n) {
     if ((exp & 1n) != 0n) {
       res = (res * base) % mod;
     }
     exp = exp >> 1n;
     base *= base;
     base = base % mod;
   }
   return res;
 }

 // Returns {g, s, t} where g is GCD(a, b) and as + bt = g.
 // ("Bézout coefficients" where |s| <= |b/d| and |y| <= |a/d|).
 function ExtendedGCD(a, b) {
   let s = 0n;
   let old_s = 1n;
   let t = 1n;
   let old_t = 0n;
   let r = b;
   let old_r = a;

   while (r != 0n) {
     let quotient = old_r / r;
     let rem = old_r % r;

     old_r = r;
     r = rem;

     // Update Bezout coefficients s and t.
     let next_s = old_s - quotient * s;
     old_s = s;
     s = next_s;

     let next_t = old_t - quotient * t;
     old_t = t;
     t = next_t;
   }

   // Now we have
   // g = old_r
   // s = old_s
   // t = old_t

   // The GCD is conventionally non-negative. If old_r is negative
   // (which can happen if inputs are negative), we negate all three
   // results to maintain the identity a*s + b*t = g.
   if (old_r < 0n) {
     old_r = -old_r;
     old_s = -old_s;
     old_t = -old_t;
   }

   return {g: old_r, s: old_s, t: old_t};
 }

 // returns a⁻¹ mod b
 // or null if the inverse does not exist.
 function ModInverse(a, b) {
   // The modulus b must be positive.
   if (b < 0n) return null;

   //   a*s + b*t = g
   // GCD g must be 1. So then we have
   //   a*s + 0*t = 1 (mod b)  =>  a*s = 1 (mod b)
   // So s is the inverse we're looking for.
   const {g, s, t} = ExtendedGCD(a, b);

   // Must be relatively prime, or no inverse exists.
   if (g != 1n) return null;

   // Ensure s is in the canonical range [0, b - 1].
   // Since |s| <= |b/d|, s+b is non-negative.
   return (s + b) % b;
 }
