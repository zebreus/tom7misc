<!doctype html>

<!-- This is not for direct use; you gotta build and then detalk
     a talk (which copies this into the destination directory). -->

<script src="slides.js"></script>
<script>

 let slide_idx = 0;
 let anim_idx = 0;
 let count = 0;

 function Draw() {
   let slide = slides[slide_idx];
   let f = slide[anim_idx];
   let screen = f.i;
   let elt = document.getElementById('proj');
   elt.src = f.i + ".png";
 }

 function Left() {
   slide_idx--;
   anim_idx = 0;
   count = 0;
   if (slide_idx < 0) slide_idx = slides.length - 1;
   window.location.hash = '#' + slide_idx;
 }

 function Right() {
   slide_idx++;
   anim_idx = 0;
   count = 0;
   if (slide_idx >= slides.length) slide_idx = 0;
   window.location.hash = '#' + slide_idx;
 }

 document.onkeydown = function(e) {
   e = e || window.event;
   if (e.ctrlKey) return true;

   switch (e.keyCode) {
     case 37: // LEFT
       Left();
       break;
     case 38: // UP
       break;
     case 39: // RIGHT
       Right();
       break;
     case 40: // DOWN
       break;
     case 32: // SPACE
       break;
   }
   Draw();
   return false;
 }

 function Frame() {
   // advance animation
   let slide = slides[slide_idx];
   count++;
   if (count > slide[anim_idx].d) {
     anim_idx++;
     if (anim_idx >= slide.length) anim_idx = 0;
     count = 0;
   }

   Draw();
   window.requestAnimationFrame(Frame);
 }

 function Start() {

   // Function to get the slide number from the URL fragment
   const hash = window.location.hash.slice(1);
   slide_idx = parseInt(hash, 10) || 0;

   window.requestAnimationFrame(Frame);
 }

</script>
<style>
 .screen {
    width: 1920px;
    height: 1080px;
    zz-image-rendering: auto;
    zz-image-rendering: crisp-edges;
    zz-image-rendering: pixelated;
    -webkit-user-select: none;
 }
 .click {
   cursor: pointer;
   font-size: 80px;
   padding: 20px;
   border: 2px solid #fff;
   margin-right: 518px;
   border-radius: 4px;
   width: 80px;
   color: #fff;
   float: left;
   -webkit-user-select: none
 }
</style>

<body bgcolor="#000" onload="Start()">
    <img id="proj" class="screen">
    <br/>
    <div class="click" onclick="Left()">&nbsp;&lt;</div>
    <div class="click" onclick="Right()">&nbsp;&gt;</div>
</body>
