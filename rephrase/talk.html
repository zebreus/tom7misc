<!doctype html>

<!-- This is not for direct use; you gotta build and then
     use "maketalk" (which copies this into the destination
     directory). -->

<!-- Expecting SCREEN_WIDTH, SCREEN_HEIGHT, and slides to be defined. -->
<script src="slides.js"></script>
<script>

 let slide_idx = 0;
 let anim_idx = 0;
 let count = 0;
 let video_dirty = true;
 let clickers_hidden = false;
 let timer_hidden = false;

 let requested_frame = false;

 // In milliseconds.
 let start_time = performance.now();

 // Gives the number of seconds (since the start) that
 // we want to be at the next target frame by.
 let next_target = 0;

 let mousex = 0.0;
 let mousey = 0.0;

 document.addEventListener("mousemove", function(e) {
   mousex = e.pageX;
   mousey = e.pageY;
 });

 // TODO: Hide
 function UpdateTimer() {
   let elt = document.getElementById('timer');
   let now = performance.now();
   let elapsed = Math.round((now - start_time) / 1000.0);

   // "target time 0" means that this is a reset slide,
   // like the title. we also don't show timer.
   if (next_target <= 0) {
     start_time = now;
     elt.innerHTML = '';
   }

   let left = next_target - elapsed;
   if (left < 0) left = 0;
   let s = '';
   if (left >= 60) {
     console.log(left);
     s += '' + ((left / 60) | 0);
     s += ":";
     console.log(s);
     left %= 60;
   } else {
     s = '0:';
   }
   if (left < 10) {
     s += "0";
   }
   s += left;

   elt.innerHTML = s;
 }

 function Draw() {
   let slide = slides[slide_idx];
   let f = slide.a[anim_idx];
   let screen = f.i;
   let elt = document.getElementById('proj');
   elt.src = f.i + ".png";
   if (video_dirty) {
     let video = document.getElementById('vid');
     if (slide.video) {
       console.log('begin video');
       video.style.position = 'fixed';
       video.style.zIndex = 999;
       // Video overlay
       video.style.left = (slide.video.x || 0) + 'px';
       video.style.top = (slide.video.y || 0) + 'px';
       video.style.width = (slide.video.w || 1920) + 'px';
       video.style.height = (slide.video.h || 1080) + 'px';

       let mute = !slide.video.audio;
       video.defaultMuted = mute;
       video.muted = mute;

       video.playsInline = true;
       if (slide.video.loop) {
         video.loop = true;
       } else {
         video.removeAttribute('loop');
       }
       console.log(slide.video.src);
       video.src = slide.video.src;
       video.style.display = 'block';
       video.play();
     } else {
       console.log('exit video');
       video.pause();
       video.style.display = 'none';
     }
     video_dirty = false;
   }
 }

 function GoTo(n) {
   video_dirty = true;
   anim_idx = 0;
   count = 0;
   if (n == 0) {
     start_time = performance.now();
   }
   while (n < 0) n += slides.length;
   n = n % slides.length;
   slide_idx = n;
   window.location.hash = '#' + slide_idx;
   if (slide_idx != 0) {
     document.body.classList.add('hidden-cursor');
     document.addEventListener('mousemove', function() {
       document.body.classList.remove('hidden-cursor');
     }, { once: true });
   }

   next_target = 0;
   for (let i = slide_idx; i < slides.length; i++) {
     if ('target' in slides[i]) {
       next_target = slides[i].target;
       break;
     }
   }

   if (!requested_frame) {
     RequestFrame();
   }
 }

 function Home() {
   GoTo(0);
 }

 function Left() {
   GoTo(slide_idx - 1);
 }

 function Right() {
   GoTo(slide_idx + 1);
 }

 function ToggleHide() {
   clickers_hidden = !clickers_hidden;
   let elt = document.getElementById('clickers');
   if (clickers_hidden) {
     elt.style.display = 'none';
   } else {
     elt.style.display = 'flex';
   }
 }

 function ToggleTimer() {
   timer_hidden = !timer_hidden;
   let elt = document.getElementById('timer');
   if (timer_hidden) {
     elt.style.display = 'none';
   } else {
     elt.style.display = 'block';
   }
 }

 function CopyTextToClipboard(text) {
   var textArea = document.createElement("textarea");

   // Probably unnecessary, but prevent it from displaying
   // if for example there is a security pop-up.
   textArea.style.position = 'fixed';
   textArea.style.top = 0;
   textArea.style.left = 0;
   textArea.style.width = '2em';
   textArea.style.height = '2em';
   textArea.style.padding = 0;
   textArea.style.border = 'none';
   textArea.style.outline = 'none';
   textArea.style.boxShadow = 'none';
   textArea.style.background = 'transparent';

   textArea.value = text;

   document.body.appendChild(textArea);
   textArea.focus();
   textArea.select();

   try {
     var successful = document.execCommand('copy');
     var msg = successful ? 'successful' : 'unsuccessful';
     console.log('Copying text command was ' + msg);
   } catch (err) {
     console.log('Couldn\'t copy');
   }

   document.body.removeChild(textArea);
 }

 function CopyPos() {
   CopyTextToClipboard('pixels ' + (0 | mousex) + ', ' +
                       'pixels ' + (0 | mousey));
 }

 document.onkeydown = function(e) {
   e = e || window.event;

   if (e.ctrlKey || e.metaKey) return true;

   switch (e.keyCode) {
     case 87: // W
     case 36: // HOME
       Home();
       break;
     case 33: // matt's thing left
     case 37: // LEFT
       Left();
       break;
     case 38: // UP
       break;
     case 34: // matt's thing left
     case 39: // RIGHT
       Right();
       break;
     case 40: // DOWN
       break;
     case 32: // SPACE
       // TODO: Play/pause video
       break;

     case 66:
       // nothing
       break;

       // Letters keycodes are just the uppercase ASCII.
     case 72: // H
       ToggleHide();
       break;
     case 84: // T
       ToggleTimer();
       break;

     case 80: // P
       CopyPos();
       break;
   }
   Draw();
   return false;
 }

 function Frame() {
   // Consume outstanding frame. To save battery, we might
   // not request another if there's no animation on
   // this slide.
   requested_frame = false;

   // TODO: Make this not be framerate dependent!
   // advance animation
   let slide = slides[slide_idx];
   count++;
   if (count > slide.a[anim_idx].d) {
     anim_idx++;
     if (anim_idx >= slide.a.length) anim_idx = 0;
     count = 0;
   }

   Draw();

   if (slide.a.length > 1) {
     RequestFrame();
   }
 }

 function RequestFrame() {
   window.requestAnimationFrame(Frame);
   requested_frame = true;
 }

 function Start() {
   // Resize using constants from JS.
   let screen = document.getElementById('proj');
   screen.style.width = SCREEN_WIDTH + 'px';
   screen.style.height = SCREEN_HEIGHT + 'px';

   let clickers = document.getElementById('clickers');
   clickers.style.width = SCREEN_WIDTH + 'px';

   let timer = document.getElementById('timer');
   timer.style.left = (SCREEN_WIDTH - 80) + 'px';
   timer.style.top = (SCREEN_HEIGHT - 40) + 'px';

   // Function to get the slide number from the URL fragment
   const hash = window.location.hash.slice(1);

   // Update the timer 4 times a second.
   setInterval(UpdateTimer, 250);

   // slide_idx = parseInt(hash, 10) || 0;
   GoTo(parseInt(hash, 10) || 0);
   // RequestFrame();
 }
</script>

<style>
 html {
   overflow: hidden
 }
 body {
   overflow: hidden
 }
 .screen {
   zz-image-rendering: auto;
   zz-image-rendering: crisp-edges;
   zz-image-rendering: pixelated;
   -webkit-user-select: none;
 }
 .click {
   cursor: pointer;
   font-size: 80px;
   padding: 20px;
   border: 2px solid #fff;
   border-radius: 4px;
   width: 80px;
   color: #fff;
   float: left;
   -webkit-user-select: none
 }
 .clickers {
   display: flex;
   justify-content: space-between;
 }
 body {
   padding: 0;
   margin: 0;
   cursor: url('mouse-cursor.png'), auto;
 }
 .hidden-cursor {
   cursor: none;
 }

 #timer {
   position: fixed;
   z-index: 99999;
   color: rgba(255, 0, 0, 0.5);
   font: 32px "FixederSys 2x";
 }
</style>

<body bgcolor="#000" onload="Start()">
  <div id="timer"></div>
  <img id="proj" class="screen">
  <video id="vid" muted="true" style="left:9999px"></video>
  <br/>
  <div id="clickers">
    <div class="click" onclick="Left()">&nbsp;&lt;</div>
    <div class="click" onclick="Right()">&nbsp;&gt;</div>
  </div>
</body>
